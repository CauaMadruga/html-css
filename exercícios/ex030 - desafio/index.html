<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            background-color: grey;
        }

        .container {
            display: grid;
            width: 100vw;
            height: 100vh;

            grid-template-rows: 3fr 1fr 8fr 2fr;
            grid-template-columns: 3fr 1fr;
            gap: 5px;

            background-color: red;
            border: 2px solid black;
        }

        .caixa {
            background-color: lightgrey;
            border: 1px solid blue;
            text-align: center;
        }

        #topo {
            grid-area: 1 / 1 / 3 / 3;
        }

        #menu {
            grid-area: 2 / 1 / 3 / 3;
        }

        #principal {
            grid-area: 3 / 1 / 4 / 2;
        }

        #secundario {
            grid-area: 3 / 2 / 4 / 3;
        }

        #rodape {
            grid-area: 4 / 1 / 5 / 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="caixa" id="topo">
            Topo
        </header>
        <nav class="caixa" id="menu">
            Menu
        </nav>
        <main class="caixa" id="principal">
            Principal
        </main>
        <aside class="caixa" id="secundario">
            Secundario
        </aside>
        <footer class="caixa" id="rodape">
            Rodapé
        </footer>
    </div>
</body>
</html>
